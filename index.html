<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST HSN/SAC Finder (10,000+ Items)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .loading-text {
            text-align: center;
            color: #3b82f6;
            font-weight: bold;
            margin: 10px 0;
            display: none;
        }
        .suggestions {
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            background: white;
            position: absolute;
            width: 100%;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        .suggestions div {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .suggestions div:hover {
            background-color: #f8fafc;
            color: #3b82f6;
        }
        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: #eff6ff;
            border-radius: 8px;
            border-left: 6px solid #3b82f6;
            display: none;
        }
        .result-card h3 {
            margin-top: 0;
            color: #1e40af;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .label { font-weight: bold; color: #475569; }
        .value { color: #0f172a; font-weight: 600; }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GST HSN/SAC Finder</h2>
    <div class="subtitle">പതിനായിരത്തിലധികം സാധനങ്ങളുടെയും സർവീസുകളുടെയും ലൈവ് വിവരങ്ങൾ</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ടൈപ്പ് ചെയ്യൂ... (e.g., Milk, Coconut, Fish, Hotel)" oninput="showSuggestions(this.value)">
        <div id="loadingStatus" class="loading-text">ഡാറ്റ ലോഡ് ചെയ്യുന്നു... ദയവായി കാത്തിരിക്കൂ...</div>
        <div id="suggestionsBox" class="suggestions"></div>
    </div>

    <div id="resultCard" class="result-card"></div>
</div>

<script>
    let gstDatabase = [];
    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestionsBox');
    const resultCard = document.getElementById('resultCard');
    const loadingStatus = document.getElementById('loadingStatus');

    // സൗജന്യ ഓപ്പൺ സോഴ്സ് ജിഎസ്ടി ഡാറ്റാബേസ് API ലോഡ് ചെയ്യാനുള്ള ഫങ്ഷൻ
    async function fetchLiveGSTData() {
        loadingStatus.style.display = 'block';
        try {
            // ഇന്റർനെറ്റിൽ പൊതുവായി ലഭ്യമായ വലിയൊരു GST JSON ഫയൽ ലിങ്കാണിത്
            const response = await fetch('https://raw.githubusercontent.com/central-registry/hsn-sac-codes/master/data.json');
            const data = await response.json();
            
            // API-യിൽ നിന്നുള്ള ഡാറ്റയെ നമ്മുടെ ആപ്പിന് പാകത്തിന് ഫോർമാറ്റ് ചെയ്ത് മാറ്റുന്നു
            gstDatabase = data.map(item => ({
                item: item.description || "Unknown Item",
                code: item.code || "N/A",
                type: item.type === "sac" ? "SAC" : "HSN",
                rate: item.rate ? item.rate + "%" : "0% / Exempted"
            }));
            
            loadingStatus.style.display = 'none';
            console.log("ഡാറ്റ വിജയകരമായി ലോഡ് ചെയ്തു. ആകെ ഐറ്റംസ്: " + gstDatabase.length);
        } catch (error) {
            loadingStatus.innerHTML = "<span style='color:red;'>ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല! ഇന്റർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക.</span>";
            console.error("Error fetching data:", error);
        }
    }

    // വെബ്‌സൈറ്റ് ഓപ്പൺ ചെയ്യുമ്പോൾ തന്നെ ബാക്ക്ഗ്രൗണ്ടിൽ പതിനായിരക്കണക്കിന് ഡാറ്റ ലോഡ് ചെയ്യും
    fetchLiveGSTData();

    function showSuggestions(value) {
        const query = value.toLowerCase().trim();
        suggestionsBox.innerHTML = '';
        
        if (query === '' || gstDatabase.length === 0) {
            suggestionsBox.style.display = 'none';
            return;
        }

        // ടൈപ്പ് ചെയ്യുന്ന വാക്കുകൾ അടങ്ങിയ 15 ഐറ്റംസ് മാത്രം ഫിൽട്ടർ ചെയ്ത് കാണിക്കുന്നു (സ്പീഡ് കൂടാൻ വേണ്ടി)
        const matches = gstDatabase.filter(data => data.item.toLowerCase().includes(query)).slice(0, 15);

        if (matches.length > 0) {
            matches.forEach(match => {
                const div = document.createElement('div');
                div.innerHTML = `<strong>${match.code}</strong> - ${match.item}`;
                div.onclick = () => selectItem(match);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            const div = document.createElement('div');
            div.innerHTML = "<span style='color:red;'>മാച്ചസിങ് ആയ വിവരങ്ങൾ ഒന്നും കണ്ടെത്തിയില്ല!</span>";
            suggestionsBox.appendChild(div);
            suggestionsBox.style.display = 'block';
        }
    }

    function selectItem(match) {
        searchInput.value = match.item;
        suggestionsBox.style.display = 'none';

        resultCard.innerHTML = `
            <h3>${match.item}</h3>
            <div class="data-row">
                <span class="label">Code Type</span>
                <span class="badge">${match.type}</span>
            </div>
            <div class="data-row">
                <span class="label">${match.type} Code</span>
                <span class="value">${match.code}</span>
            </div>
            <div class="data-row">
                <span class="label">Estimated GST Rate</span>
                <span class="value" style="color: #2563eb;">${match.rate}</span>
            </div>
        `;
        resultCard.style.display = 'block';
    }

    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) {
            suggestionsBox.style.display = 'none';
        }
    });
</script>

</body>
</html>
