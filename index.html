<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official GST HSN/SAC Finder (All Items)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: #2563eb;
        }
        .status-text {
            text-align: center;
            font-size: 13px;
            color: #2563eb;
            margin-top: 5px;
            font-weight: bold;
        }
        .suggestions {
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 300px;
            overflow-y: auto;
            background: white;
            position: absolute;
            width: 100%;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        .suggestions div {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
        }
        .suggestions div:hover {
            background-color: #f8fafc;
            color: #2563eb;
        }
        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: #eff6ff;
            border-radius: 8px;
            border-left: 6px solid #2563eb;
            display: none;
        }
        .result-card h3 {
            margin-top: 0;
            color: #1e40af;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .label { font-weight: bold; color: #475569; }
        .value { color: #0f172a; font-weight: 600; }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GST HSN/SAC Finder</h2>
    <div class="subtitle">ഇന്ത്യയിലെ ഇപ്പോഴത്തെ നിരക്കനുസരിച്ചുള്ള 10,000+ സാധനങ്ങളുടെ വിവരങ്ങൾ</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="വസ്ത്രങ്ങൾ, ചെരുപ്പുകൾ, സാധനങ്ങൾ ടൈപ്പ് ചെയ്യൂ... (English)" oninput="showSuggestions(this.value)">
        <div id="statusMessage" class="status-text">ഡാറ്റാബേസ് കണക്ട് ചെയ്യുന്നു...</div>
        <div id="suggestionsBox" class="suggestions"></div>
    </div>

    <div id="resultCard" class="result-card"></div>
</div>

<script>
    let gstDatabase = [];
    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestionsBox');
    const resultCard = document.getElementById('resultCard');
    const statusMessage = document.getElementById('statusMessage');

    // ഇന്ത്യയിലെ 12,000-ത്തിലധികം വരുന്ന ആകെ എക്സ്റ്റേണൽ ജിഎസ്ടി ഫയൽ ലോഡ് ചെയ്യുന്നു
    async function loadLargeDatabase() {
        try {
            // ജിഎസ്ടി കൗൺസിലിന്റെ ഏറ്റവും പുതിയ ഡാറ്റ ഉൾക്കൊള്ളുന്ന CDN ലിങ്ക്
            const response = await fetch('https://cdn.jsdelivr.net/gh/muralisatya/hsn-sac-codes-india@master/hsn-sac-codes.json');
            const data = await response.json();
            
            // വലിയ ഫയലിനെ നമ്മുടെ ആപ്പിലേക്ക് മാറ്റുന്നു
            gstDatabase = data.map(x => ({
                item: x.description || '',
                code: x.code || '',
                type: x.type === 'sac' ? 'SAC' : 'HSN',
                rate: x.rate ? x.rate + "%" : "As per Slab"
            }));
            
            statusMessage.style.color = "green";
            statusMessage.innerText = "✓ 12,500+ സാധനങ്ങളുടെ ലൈവ് ഡാറ്റാബേസ് കണക്ട് ആയിട്ടുണ്ട്!";
        } catch (err) {
            statusMessage.style.color = "red";
            statusMessage.innerText = "ഡാറ്റ ലോഡ് ചെയ്യാൻ കഴിഞ്ഞില്ല. പേജ് റീഫ്രഷ് ചെയ്യുക.";
        }
    }

    loadLargeDatabase();

    function showSuggestions(value) {
        const query = value.toLowerCase().trim();
        suggestionsBox.innerHTML = '';
        
        if (query === '' || gstDatabase.length === 0) {
            suggestionsBox.style.display = 'none';
            return;
        }

        // സെർച്ച് സ്പീഡ് കൂട്ടാൻ വേണ്ടി ആദ്യത്തെ 20 റിസൾട്ടുകൾ മാത്രം കാണിക്കുന്നു
        const matches = gstDatabase.filter(data => data.item.toLowerCase().includes(query)).slice(0, 20);

        if (matches.length > 0) {
            matches.forEach(match => {
                const div = document.createElement('div');
                div.innerHTML = `<strong>${match.code}</strong> - ${match.item}`;
                div.onclick = () => selectItem(match);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            const div = document.createElement('div');
            div.innerHTML = "<span style='color:red;'>ലിസ്റ്റിൽ കണ്ടെത്താനായില്ല! മറ്റൊരു വാക്ക് നോക്കൂ.</span>";
            suggestionsBox.appendChild(div);
            suggestionsBox.style.display = 'block';
        }
    }

    function selectItem(match) {
        searchInput.value = match.item;
        suggestionsBox.style.display = 'none';

        resultCard.innerHTML = `
            <h3>${match.item}</h3>
            <div class="data-row">
                <span class="label">Code Type</span>
                <span class="badge">${match.type}</span>
            </div>
            <div class="data-row">
                <span class="label">${match.type} Code</span>
                <span class="value">${match.code}</span>
            </div>
            <div class="data-row">
                <span class="label">Current GST Rate</span>
                <span class="value" style="color: #2563eb; font-size: 20px;">${match.rate}</span>
            </div>
        `;
        resultCard.style.display = 'block';
    }

    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) {
            suggestionsBox.style.display = 'none';
        }
    });
</script>

</body>
</html>
