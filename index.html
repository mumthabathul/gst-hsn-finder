<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST HSN/SAC Finder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .search-box {
            position: relative;
        }
        input[type="text"] {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: #3b82f6;
        }
        .suggestions {
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 250px;
            overflow-y: auto;
            background: white;
            position: absolute;
            width: 100%;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        .suggestions div {
            padding: 12px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .suggestions div:hover {
            background-color: #f8fafc;
            color: #3b82f6;
        }
        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: #eff6ff;
            border-radius: 8px;
            border-left: 6px solid #3b82f6;
            display: none;
        }
        .result-card h3 {
            margin-top: 0;
            color: #1e40af;
        }
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .label { font-weight: bold; color: #475569; }
        .value { color: #0f172a; font-weight: 600; }
        .badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GST HSN/SAC Finder</h2>
    <div class="subtitle">സാധനങ്ങളുടെയോ സർവീസുകളുടെയോ പേര് ടൈപ്പ് ചെയ്യുക</div>
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ടൈപ്പ് ചെയ്യൂ... (e.g., Milk, Mobile, Hotel)" oninput="showSuggestions(this.value)">
        <div id="suggestionsBox" class="suggestions"></div>
    </div>

    <div id="resultCard" class="result-card"></div>
</div>

<script>
    // വിപുലീകരിച്ച ഡാറ്റാബേസ് (ഇതിൽ കൂടുതൽ ഐറ്റംസ് ചേർത്തിട്ടുണ്ട്)
    const gstDatabase = [
        { item: "Milk (Fresh/Pasteurized)", code: "0401", type: "HSN", rate: "0% (Exempted)" },
        { item: "Milk Powder", code: "0402", type: "HSN", rate: "5%" },
        { item: "Mobile Phones", code: "8517", type: "HSN", rate: "18%" },
        { item: "Laptop / Computer", code: "8471", type: "HSN", rate: "18%" },
        { item: "Books / Newspapers", code: "4901", type: "HSN", rate: "0%" },
        { item: "Hotel Accommodation (< ₹7500)", code: "9963", type: "SAC", rate: "12%" },
        { item: "Hotel Accommodation (> ₹7500)", code: "9963", type: "SAC", rate: "18%" },
        { item: "Restaurant Services (Normal)", code: "9963", type: "SAC", rate: "5% (No ITC)" },
        { item: "Software Development", code: "9973", type: "SAC", rate: "18%" },
        { item: "Cement", code: "2523", type: "HSN", rate: "28%" },
        { item: "Rice / Wheat (Unbranded)", code: "1006", type: "HSN", rate: "0%" },
        { item: "Rice / Wheat (Branded)", code: "1006", type: "HSN", rate: "5%" },
        { item: "Butter / Ghee / Cheese", code: "0405", type: "HSN", rate: "12%" },
        { item: "Ice Cream", code: "2105", type: "HSN", rate: "18%" },
        { item: "Tea / Coffee", code: "0902", type: "HSN", rate: "5%" },
        { item: "Gold Jewelry", code: "7113", type: "HSN", rate: "3%" }
    ];

    const searchInput = document.getElementById('searchInput');
    const suggestionsBox = document.getElementById('suggestionsBox');
    const resultCard = document.getElementById('resultCard');

    function showSuggestions(value) {
        const query = value.toLowerCase().trim();
        suggestionsBox.innerHTML = '';
        
        if (query === '') {
            suggestionsBox.style.display = 'none';
            return;
        }

        // ടൈപ്പ് ചെയ്യുന്ന അക്ഷരങ്ങൾ ഉള്ള ഐറ്റംസ് ഫിൽട്ടർ ചെയ്യുക
        const matches = gstDatabase.filter(data => data.item.toLowerCase().includes(query));

        if (matches.length > 0) {
            matches.forEach(match => {
                const div = document.createElement('div');
                div.innerHTML = match.item;
                div.onclick = () => selectItem(match);
                suggestionsBox.appendChild(div);
            });
            suggestionsBox.style.display = 'block';
        } else {
            const div = document.createElement('div');
            div.innerHTML = "<span style='color:red;'>വിവരങ്ങൾ ലഭ്യമല്ല!</span>";
            suggestionsBox.appendChild(div);
            suggestionsBox.style.display = 'block';
        }
    }

    function selectItem(match) {
        searchInput.value = match.item;
        suggestionsBox.style.display = 'none';

        // റിസൾട്ട് കാർഡിൽ വിവരങ്ങൾ കാണിക്കുക
        resultCard.innerHTML = `
            <h3>${match.item}</h3>
            <div class="data-row">
                <span class="label">Code Type</span>
                <span class="badge">${match.type}</span>
            </div>
            <div class="data-row">
                <span class="label">${match.type} Code</span>
                <span class="value">${match.code}</span>
            </div>
            <div class="data-row">
                <span class="label">GST Rate</span>
                <span class="value" style="color: #2563eb;">${match.rate}</span>
            </div>
        `;
        resultCard.style.display = 'block';
    }

    // ക്ലിക്ക് ചെയ്യുമ്പോൾ സജഷൻ ബോക്സ് മറയ്ക്കാൻ
    document.addEventListener('click', (e) => {
        if (e.target !== searchInput) {
            suggestionsBox.style.display = 'none';
        }
    });
</script>

</body>
</html>
