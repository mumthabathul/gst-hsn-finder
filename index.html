<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST HSN/SAC Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            box-sizing: border-box;
            border: 2px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3fe;
            border-left: 6px solid #2196F3;
            display: none;
        }
        .error-box {
            margin-top: 20px;
            padding: 15px;
            background: #fde8e8;
            border-left: 6px solid #f44336;
            color: #d32f2f;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>GST HSN/SAC Code Finder</h2>
    <p>സാധനങ്ങളുടെയോ സർവീസുകളുടെയോ പേര് നൽകി സെർച്ച് ചെയ്യുക (ഉദാഹരണത്തിന്: Mobile, Laptop, Hotel)</p>
    
    <input type="text" id="searchInput" placeholder="Search item...">
    <button onclick="searchHSN()">Search</button>

    <div id="result" class="result-box"></div>
    <div id="error" class="error-box">മാച്ചസിങ് ആയ വിവരങ്ങൾ ഒന്നും തന്നെ കണ്ടെത്താനായില്ല!</div>
</div>

<script>
    // സാമ്പിൾ ഡാറ്റ (ഇതിൽ നിങ്ങൾക്ക് കൂടുതൽ ഐറ്റംസ് ചേർക്കാം)
    const gstData = [
        { item: "mobile", code: "8517", type: "HSN", rate: "18%" },
        { item: "laptop", code: "8471", type: "HSN", rate: "18%" },
        { item: "computer", code: "8471", type: "HSN", rate: "18%" },
        { item: "books", code: "4901", type: "HSN", rate: "0%" },
        { item: "hotel", code: "9963", type: "SAC", rate: "5% / 12% / 18%" },
        { item: "software", code: "9973", type: "SAC", rate: "18%" },
        { item: "cement", code: "2523", type: "HSN", rate: "28%" },
        { item: "rice", code: "1006", type: "HSN", rate: "0% (Unbranded)" }
    ];

    function searchHSN() {
        const query = document.getElementById("searchInput").value.toLowerCase().trim();
        const resultBox = document.getElementById("result");
        const errorBox = document.getElementById("error");

        // പഴയ റിസൾട്ടുകൾ ക്ലിയർ ചെയ്യുക
        resultBox.style.display = "none";
        errorBox.style.display = "none";

        if(query === "") {
            alert("ദയവായി എന്തെങ്കിലും ടൈപ്പ് ചെയ്യുക!");
            return;
        }

        // ഡാറ്റയിൽ സെർച്ച് ചെയ്യുക
        const foundItem = gstData.find(data => data.item.includes(query));

        if (foundItem) {
            resultBox.innerHTML = `
                <h3>ഫലം കണ്ടെത്തീരിക്കുന്നു:</h3>
                <p><strong>Item:</strong> ${foundItem.item.toUpperCase()}</p>
                <p><strong>${foundItem.type} Code:</strong> ${foundItem.code}</p>
                <p><strong>GST Rate:</strong> ${foundItem.rate}</p>
            `;
            resultBox.style.display = "block";
        } else {
            errorBox.style.display = "block";
        }
    }
</script>

</body>
</html>
